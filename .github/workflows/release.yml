name: Release

on:
  push:
    tags: ['v*']

jobs:
  split-bundle:
    name: Split bundle to ducrot/twigcn-bundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Subtree split packages/bundle
        uses: danharrin/monorepo-split-github-action@v2.4.4
        env:
          GITHUB_TOKEN: ${{ secrets.SPLIT_TOKEN }}
        with:
          tag: ${{ github.ref_name }}
          package_directory: 'packages/bundle'
          repository_organization: 'ducrot'
          repository_name: 'twigcn-bundle'
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

  publish-ui:
    name: Publish @ducrot/twigcn-ui to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        run: |
          PKG_VERSION=$(node -p "require('./packages/ui/package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $TAG_VERSION does not match package.json version $PKG_VERSION" >&2
            exit 1
          fi

      - name: Publish
        run: npm publish --workspace=@ducrot/twigcn-ui --provenance
